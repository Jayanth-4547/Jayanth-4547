<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a" />
  
  <foreignObject x="20" y="20" width="760" height="360">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:sans-serif; color:white;">

      <!-- TEST A: Object + Data URI -->
      <div style="border:1px solid #c084fc; margin-bottom:20px; padding:10px; background:rgba(192,132,252,0.1);">
        <strong>Test A: &lt;object&gt; + Data URI</strong>
        <p style="font-size:12px; color:#d8b4fe;">Goal: Does object render internal base64 active documents?</p>
        
        <!-- Base64 decodes to a purple div saying "HELLO OBJECT" -->
        <object data="data:text/html;base64,PGRpdiBzdHlsZT0iYmFja2dyb3VuZDpwdXJwbGU7Y29sb3I6d2hpdGU7cGFkZGluZzoyMHB4O2ZvbnQtZmFtaWx5OnNhbnMtc2VyaWY7Ij48aDE+SEVMTE8gT0JKRUNUPC9oMT48L2Rpdj4=" type="text/html" width="100%" height="100">
          <div style="background:#ef4444; padding:10px;">Fallback: Object Data URI Blocked</div>
        </object>
      </div>

      <!-- TEST B: Embed + Data URI -->
      <div style="border:1px solid #2dd4bf; padding:10px; background:rgba(45,212,191,0.1);">
        <strong>Test B: &lt;embed&gt; + Data URI</strong>
        <p style="font-size:12px; color:#5eead4;">Goal: Does the blank white space accept internal base64 content?</p>
        
        <!-- Base64 decodes to a teal div saying "HELLO EMBED" -->
        <embed src="data:text/html;base64,PGRpdiBzdHlsZT0iYmFja2dyb3VuZDp0ZWFsO2NvbG9yOndoaXRlO3BhZGRpbmc6MjBweDtmb250LWZhbWlseTpzYW5zLXNlcmlmOyI+PGgxPkhFTExPIEVNQkVEPC9oMT48L2Rpdj4=" type="text/html" width="100%" height="100" />
      </div>

    </div>
  </foreignObject>
</svg>
